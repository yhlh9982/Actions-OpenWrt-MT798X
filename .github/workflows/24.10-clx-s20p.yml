name: 24.10-clx-s20p

env:
  DEVICE_NAME: 24.10-clx-s20p
  # REPO_URL: https://github.com/dailook/immortalwrt-mt798x-6.6
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 24.10/mt7986-clx-s20p.config
  DIY_P1_SH: 24.10/diy-part1.sh
  DIY_P2_SH: 24.10/diy-part2.sh
  DIY_P3_SH: diy-partX.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # =========================================================
    # 1. 释放空间 + 初始化编译环境
    # =========================================================
    - name: Free disk space & init build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 删除大型预装软件
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/lib/jvm
        sudo docker image prune --all --force

        # 配置 12GB Swap（Rust/LLVM 编译需要大量虚拟内存）
        sudo swapoff -a && sudo rm -f /mnt/swapfile
        sudo fallocate -l 12G /mnt/swapfile
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

        # 系统更新
        sudo -E apt-get -yqq purge firefox snapd
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq full-upgrade

        # 安装 eBPF / daed 编译依赖
        sudo -E apt-get -yqq install clang llvm dwarves build-essential \
          libssl-dev libelf-dev bc flex bison python3 xz-utils tar \
          dos2unix libfuse-dev

        # 安装 ImmortalWrt 官方编译依赖
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

        # 安装 pnpm（daed 前端构建需要）
        sudo npm install -g pnpm

        # 清理
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo -E timedatectl set-timezone "$TZ"

        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "磁盘空间:" && df -hT
        echo "内存/Swap:" && free -h

    # =========================================================
    # 2. 克隆源码
    # =========================================================
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # =========================================================
    # 3. 更新并安装 Feeds
    # =========================================================
    - name: Update & install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # =========================================================
    # 4. 加载自定义 Feeds
    # =========================================================
    - name: Load custom feeds (diy-part1.sh)
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # =========================================================
    # 5. 加载自定义配置 (diy-part2.sh)
    # =========================================================
    - name: Load custom configuration (diy-part2.sh)
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # =========================================================
    # 5.5 加载自定义配置 (diy-part3.sh)
    # =========================================================
    - name: Load custom configuration (diy-part3.sh)
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P3_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P3_SH

    # =========================================================
    # 6. SSH 调试（可选）
    # =========================================================
    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')

    # =========================================================
    # 7. 下载软件包
    # =========================================================
    - name: Download packages
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8 || make download -j1 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # =========================================================
    # 8. 编译固件
    # =========================================================
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo "开始编译... ($(nproc) 线程)"
        df -hT /

        if make -j$(nproc); then
          echo "多线程编译成功"
        elif make -j1; then
          echo "单线程编译成功"
        elif make -j1 V=s; then
          echo "单线程详细日志编译成功"
        else
          echo "编译失败"
          exit 1
        fi

        echo "========================================"
        echo "固件编译完成"
        echo "最终磁盘空间:"
        df -hT /
        echo "========================================"

        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    # =========================================================
    # 9. 上传 bin 目录（Artifacts）
    # =========================================================
    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    # =========================================================
    # 10. 整理固件文件
    # =========================================================
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # =========================================================
    # 11. 生成发布标签和日志
    # =========================================================
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        AUTHOR=$(echo "${{ env.REPO_URL }}" | cut -d'/' -f4)
        DEVICE_NAME="${{ env.DEVICE_NAME }}"
        BRANCH="${{ env.REPO_BRANCH }}"
        BUILD_TIME=$(date +"%Y%m%d-%H%M")

        RELEASE_TAG="${DEVICE_NAME}-${AUTHOR}-${BRANCH}-${BUILD_TIME}"
        RELEASE_TAG=$(echo "$RELEASE_TAG" | sed 's/[^a-zA-Z0-9._-]/-/g')

        echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT

        touch release.txt
        echo "## 🚀 OpenWrt 自动编译固件" >> release.txt
        echo "" >> release.txt
        echo "### 📋 编译信息" >> release.txt
        echo "| 项目 | 详情 |" >> release.txt
        echo "|------|------|" >> release.txt
        echo "| 📱 设备名称 | \`${DEVICE_NAME}\` |" >> release.txt
        echo "| 👤 源码作者 | \`${AUTHOR}\` |" >> release.txt
        echo "| 🔗 源码仓库 | ${{ env.REPO_URL }} |" >> release.txt
        echo "| 🌿 分支版本 | \`${BRANCH}\` |" >> release.txt
        echo "| ⏰ 编译时间 | $(date '+%Y-%m-%d %H:%M:%S') (Shanghai) |" >> release.txt
        echo "| 🏷️ 版本标签 | \`${RELEASE_TAG}\` |" >> release.txt
        echo "" >> release.txt
        echo "---" >> release.txt
        echo "> ⚠️ **注意**: 请根据自己的机型选择对应的 Factory 或 Sysupgrade 固件" >> release.txt

        echo "status=success" >> $GITHUB_OUTPUT

    # =========================================================
    # 12. 发布到 GitHub Release
    # =========================================================
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2.3.2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*.bin
          ${{ env.FIRMWARE }}/*.ipk
          ${{ env.FIRMWARE }}/*.img.gz
          ${{ env.FIRMWARE }}/*.manifest
          ${{ env.FIRMWARE }}/*.tar.gz

    # =========================================================
    # 13. 清理旧的工作流记录
    # =========================================================
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 10

    # =========================================================
    # 14. 清理旧的 Release 发布
    # =========================================================
    - name: Remove old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
